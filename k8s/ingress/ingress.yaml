apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alpha-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:

          # Backend API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          - path: /ready
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          - path: /db
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          # Frontend routes
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80