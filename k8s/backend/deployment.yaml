apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 688567271441.dkr.ecr.ap-southeast-1.amazonaws.com/alpha-devops-dev-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "alpha-devops-dev-postgres.cdwm44ckm8yi.ap-southeast-1.rds.amazonaws.com"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres123"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5