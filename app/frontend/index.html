<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alpha DevOps Assignment</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    text-align:center;
    margin-top:80px;
}

h1{
    font-size:36px;
    color:#333;
    margin-bottom:40px;
}

button{
    background:#1f73d8;
    color:white;
    border:none;
    padding:14px 28px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#155bb5;
}

#result{
    margin-top:25px;
    background:white;
    border-radius:8px;
    padding:15px;
    display:inline-block;
    text-align:left;
    min-width:260px;
    font-size:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.status-box{
    margin-top:30px;
    font-size:20px;
}

.footer{
    margin-top:40px;
    color:#777;
    font-size:16px;
}

</style>

</head>

<body>

<h1>Alpha DevOps Assignment</h1>

<button onclick="checkHealth()">Check Backend Health</button>

<div class="status-box">
Status: <strong id="status">Unknown</strong><br>
Version: <strong id="version">Unknown</strong>
</div>

<pre id="result">Click the button to check backend status</pre>

<div class="footer">
Built by <strong>Amarjot Singh</strong>
</div>

<script>

async function checkHealth(){

    const resultBox = document.getElementById("result")
    const statusText = document.getElementById("status")
    const versionText = document.getElementById("version")

    resultBox.textContent = "Checking backend..."

    try{

        const response = await fetch("/api/health")
        const data = await response.json()

        statusText.textContent = data.status
        versionText.textContent = data.version

        resultBox.textContent =
        JSON.stringify(data, null, 2)

    }
    catch(error){

        resultBox.textContent = "Error connecting to backend"

        statusText.textContent = "Error"
        versionText.textContent = "N/A"

    }

}

</script>

</body>
</html>
