name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:

    runs-on: ubuntu-latest

    steps:

    # Checkout repo
    - name: Checkout Code
      uses: actions/checkout@v4

    # Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # Build backend image
    - name: Build Backend Image
      run: |
        docker build -t backend ./app/backend
        docker tag backend:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:latest

    # Build frontend image
    - name: Build Frontend Image
      run: |
        docker build -t frontend ./app/frontend
        docker tag frontend:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:latest

    # Push backend image
    - name: Push Backend Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:latest

    # Push frontend image
    - name: Push Frontend Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:latest

    # Setup kubectl
    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
        --region ${{ secrets.AWS_REGION }} \
        --name ${{ secrets.EKS_CLUSTER_NAME }}

    # Deploy manifests
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/

    # Restart deployments
    - name: Restart Pods
      run: |
        kubectl rollout restart deployment backend
        kubectl rollout restart deployment frontend

    # Wait for rollout
    - name: Wait for Deployments
      run: |
        kubectl rollout status deployment/backend
        kubectl rollout status deployment/frontend

    # Smoke test
    - name: Smoke Test
      run: |
        URL=$(kubectl get ingress alpha-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        curl -f http://$URL/api/health