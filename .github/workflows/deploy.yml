name: CI-CD Pipeline

on:
  push:
    branches:
      - main

# prevent multiple deployments running together
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    # checkout code
    - name: Checkout
      uses: actions/checkout@v4


    # configure aws
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    # login to ecr
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2


    # build backend image
    - name: Build Backend
      run: docker build -t backend ./app/backend


    # build frontend image
    - name: Build Frontend
      run: docker build -t frontend ./app/frontend


    # scan backend image
    - name: Scan Backend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: backend


    # scan frontend image
    - name: Scan Frontend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: frontend


    # tag backend image
    - name: Tag Backend
      run: |
        docker tag backend \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}


    # tag frontend image
    - name: Tag Frontend
      run: |
        docker tag frontend \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}


    # push backend image
    - name: Push Backend
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}


    # push frontend image
    - name: Push Frontend
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}


    # show deployment version
    - name: Show Version
      run: echo "Deploying version ${{ github.sha }}"


    # configure kubectl for eks
    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
        --region ${{ secrets.AWS_REGION }} \
        --name ${{ secrets.EKS_CLUSTER_NAME }}


    # inject image tags
    - name: Inject Image Tags
      run: |
        BACKEND_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
        FRONTEND_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}
        sed -i "s|BACKEND_IMAGE|$BACKEND_IMAGE|g" k8s/backend/deployment.yaml
        sed -i "s|FRONTEND_IMAGE|$FRONTEND_IMAGE|g" k8s/frontend/deployment.yaml
        sed -i "s/VERSION_TAG/${{ github.sha }}/g" k8s/backend-deployment.yaml


    # deploy to kubernetes
    - name: Deploy
      run: |
        kubectl apply -f k8s/backend/
        kubectl apply -f k8s/frontend/
        kubectl apply -f k8s/ingress/


    # restart deployments
    - name: Restart Deployments
      run: |
        kubectl rollout restart deployment backend
        kubectl rollout restart deployment frontend


    # wait for rollout
    - name: Wait for Rollout
      run: |
        kubectl rollout status deployment/backend
        kubectl rollout status deployment/frontend


    # show cluster status
    - name: Check Resources
      run: |
        kubectl get pods
        kubectl get svc
        kubectl get ingress


    # smoke test api
    - name: Smoke Test
      run: |
        URL=$(kubectl get ingress alpha-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        curl -f http://$URL/api/health


    # rollback if failed
    - name: Rollback
      if: failure()
      run: |
        kubectl rollout undo deployment backend
        kubectl rollout undo deployment frontend


    # show deployment urls
    - name: Deployment Summary
      run: |
        URL=$(kubectl get ingress alpha-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        echo "Application deployed"
        echo "Frontend: http://$URL"
        echo "Backend: http://$URL/api/health"